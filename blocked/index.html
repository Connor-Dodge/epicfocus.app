<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked — Epic Focus</title>
  <link rel="icon" type="image/png" href="../assets/icon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --border: #1e1e2e;
      --text: #e0e0e8;
      --text-muted: #8888a0;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.3);
      --gold: #f0c040;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124, 92, 252, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 92, 252, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      text-align: center;
    }

    .shield {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      font-family: 'Silkscreen', monospace;
      color: var(--accent);
    }

    h1 {
      font-family: 'Silkscreen', monospace;
      font-size: 1.5rem;
      color: white;
      margin-bottom: 12px;
    }

    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .domain {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      font-family: monospace;
      font-size: 0.875rem;
      color: var(--gold);
      margin-bottom: 24px;
      word-break: break-all;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">||</span>
    <h1>Site Blocked</h1>
    <p>This site is blocked by your Epic Focus profile. Stay focused and get back to your quest.</p>
    <div class="domain" id="blocked-domain"></div>
    <p class="hint">To unblock this site, update your block profile in Epic Focus.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const domain = params.get('domain');
    const el = document.getElementById('blocked-domain');
    if (domain) {
      el.textContent = domain;
    } else {
      el.style.display = 'none';
    }
  </script>
</body>
</html>
